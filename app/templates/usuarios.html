<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — RateIt</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-mark">R</div>
        <span class="logo-text">RateIt</span>
      </a>
      <nav>
        <a href="/">Início</a>
        <a href="/page/usuarios" class="active">Usuários</a>
        <a href="/page/categorias">Categorias</a>
        <a href="/page/itens">Itens</a>
        <a href="/page/avaliacoes">Avaliações</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>Usuários</h2>
      <p>Gerencie os usuários cadastrados no sistema.</p>
    </div>

    <div id="mensagem" class="mensagem hidden"></div>

    <div class="form-card">
      <h3 id="form-titulo">Novo usuário</h3>
      <div class="form-row">
        <input type="hidden" id="usuario-id">
        <input type="text" id="usuario-nome" placeholder="Nome completo">
        <input type="email" id="usuario-email" placeholder="E-mail">
        <button onclick="salvarUsuario()">Salvar</button>
        <button class="btn-secondary" onclick="cancelarEdicao()" id="btn-cancelar" style="display:none">Cancelar</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-usuarios"></tbody>
      </table>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    carregarUsuarios();

    function carregarUsuarios() {
      fetch('/usuarios').then(r => r.json()).then(data => {
        const tbody = document.getElementById('lista-usuarios');
        tbody.innerHTML = '';
        if (!data.length) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Nenhum usuário cadastrado.</td></tr>';
          return;
        }
        data.forEach(u => {
          tbody.innerHTML += `
            <tr>
              <td><span class="id-badge">#${u.id}</span></td>
              <td>${u.nome}</td>
              <td>${u.email}</td>
              <td class="acoes">
                <button class="btn-editar" onclick="editarUsuario(${u.id},'${u.nome}','${u.email}')">Editar</button>
                <button class="btn-deletar" onclick="deletarUsuario(${u.id})">Deletar</button>
              </td>
            </tr>`;
        });
      });
    }

    function salvarUsuario() {
      const id = document.getElementById('usuario-id').value;
      const nome = document.getElementById('usuario-nome').value.trim();
      const email = document.getElementById('usuario-email').value.trim();
      if (!nome || !email) { mostrarMensagem('Preencha todos os campos!', 'erro'); return; }
      const url = id ? `/usuarios/${id}` : '/usuarios';
      const method = id ? 'PUT' : 'POST';
      fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({nome, email}) })
        .then(r => r.json()).then(data => {
          if (data.erro) { mostrarMensagem(data.erro, 'erro'); return; }
          mostrarMensagem(id ? 'Usuário atualizado!' : 'Usuário criado!', 'sucesso');
          cancelarEdicao(); carregarUsuarios();
        });
    }

    function editarUsuario(id, nome, email) {
      document.getElementById('usuario-id').value = id;
      document.getElementById('usuario-nome').value = nome;
      document.getElementById('usuario-email').value = email;
      document.getElementById('form-titulo').textContent = 'Editar usuário';
      document.getElementById('btn-cancelar').style.display = 'inline-block';
    }

    function deletarUsuario(id) {
      if (!confirm('Deseja deletar este usuário?')) return;
      fetch(`/usuarios/${id}`, {method:'DELETE'}).then(r => r.json()).then(() => {
        mostrarMensagem('Usuário deletado!', 'sucesso'); carregarUsuarios();
      });
    }

    function cancelarEdicao() {
      document.getElementById('usuario-id').value = '';
      document.getElementById('usuario-nome').value = '';
      document.getElementById('usuario-email').value = '';
      document.getElementById('form-titulo').textContent = 'Novo usuário';
      document.getElementById('btn-cancelar').style.display = 'none';
    }
  </script>
</body>
</html>
