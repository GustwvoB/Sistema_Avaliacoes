<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — RateIt</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-mark">R</div>
        <span class="logo-text">RateIt</span>
      </a>
      <nav>
        <a href="/">Início</a>
        <a href="/page/usuarios">Usuários</a>
        <a href="/page/categorias" class="active">Categorias</a>
        <a href="/page/itens">Itens</a>
        <a href="/page/avaliacoes">Avaliações</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>Categorias</h2>
      <p>Organize os itens por tipo e categoria.</p>
    </div>

    <div id="mensagem" class="mensagem hidden"></div>

    <div class="form-card">
      <h3 id="form-titulo">Nova categoria</h3>
      <div class="form-row">
        <input type="hidden" id="categoria-id">
        <input type="text" id="categoria-nome" placeholder="Nome da categoria (ex: Filmes, Produtos...)">
        <button onclick="salvarCategoria()">Salvar</button>
        <button class="btn-secondary" onclick="cancelarEdicao()" id="btn-cancelar" style="display:none">Cancelar</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-categorias"></tbody>
      </table>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    carregarCategorias();

    function carregarCategorias() {
      fetch('/categorias').then(r => r.json()).then(data => {
        const tbody = document.getElementById('lista-categorias');
        tbody.innerHTML = '';
        if (!data.length) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="3">Nenhuma categoria cadastrada.</td></tr>';
          return;
        }
        data.forEach(c => {
          tbody.innerHTML += `
            <tr>
              <td><span class="id-badge">#${c.id}</span></td>
              <td>${c.nome}</td>
              <td class="acoes">
                <button class="btn-editar" onclick="editarCategoria(${c.id},'${c.nome}')">Editar</button>
                <button class="btn-deletar" onclick="deletarCategoria(${c.id})">Deletar</button>
              </td>
            </tr>`;
        });
      });
    }

    function salvarCategoria() {
      const id = document.getElementById('categoria-id').value;
      const nome = document.getElementById('categoria-nome').value.trim();
      if (!nome) { mostrarMensagem('Preencha o nome da categoria!', 'erro'); return; }
      const url = id ? `/categorias/${id}` : '/categorias';
      const method = id ? 'PUT' : 'POST';
      fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({nome}) })
        .then(r => r.json()).then(data => {
          if (data.erro) { mostrarMensagem(data.erro, 'erro'); return; }
          mostrarMensagem(id ? 'Categoria atualizada!' : 'Categoria criada!', 'sucesso');
          cancelarEdicao(); carregarCategorias();
        });
    }

    function editarCategoria(id, nome) {
      document.getElementById('categoria-id').value = id;
      document.getElementById('categoria-nome').value = nome;
      document.getElementById('form-titulo').textContent = 'Editar categoria';
      document.getElementById('btn-cancelar').style.display = 'inline-block';
    }

    function deletarCategoria(id) {
      if (!confirm('Deseja deletar esta categoria?')) return;
      fetch(`/categorias/${id}`, {method:'DELETE'}).then(r => r.json()).then(() => {
        mostrarMensagem('Categoria deletada!', 'sucesso'); carregarCategorias();
      });
    }

    function cancelarEdicao() {
      document.getElementById('categoria-id').value = '';
      document.getElementById('categoria-nome').value = '';
      document.getElementById('form-titulo').textContent = 'Nova categoria';
      document.getElementById('btn-cancelar').style.display = 'none';
    }
  </script>
</body>
</html>
